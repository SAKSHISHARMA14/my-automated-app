name: Sakshi DevOps CI Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-secure:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Build Optimized Docker Image
      run: |
        docker build -t sakshi-automated-app:${{ github.sha}} .

    - name: Run Automated Trivy Security Scan
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'sakshi-automated-app:${{ github.sha}}'
        format: 'table'
        severity: 'CRITICAL,HIGH'